services:
  - type: web
    name: wagers
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm install --prefix client --include=dev && npm run build --prefix client
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: wagers-db
          property: connectionString

databases:
  - name: wagers-db
    plan: free
    region: frankfurt
